<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <title>Image Gallery</title>

    <style>
        :root{
            --bg: #faf9fb;
            --surface: #ffffff;
            --ink: #3b3550;
            --muted: #8a8399;
            --accent: #c98ba0;
            --accent-dark: #b06e85;
            --line: #ece8f0;
        }

        body{
            background: var(--bg);
            font-family: 'Poppins', sans-serif;
            color: var(--ink);
        }

        /* Navbar */
        .navbar{
            background: var(--surface) !important;
            border-bottom: 1px solid var(--line);
            padding: 16px 0;
        }

        .navbar-brand{
            color: var(--ink) !important;
            font-weight:700;
            letter-spacing:.5px;
            font-size: 1.3rem;
        }

        /* Upload Card */
        .card{
            transition:0.3s;
            border:none;
            border-radius:16px;
            overflow:hidden;
        }

        .upload-card{
            background: var(--surface);
            box-shadow: 0 4px 25px rgba(59,53,80,.06) !important;
        }

        .text-primary{
            color: var(--ink) !important;
            font-weight: 600;
        }

        /* Hide default Django form label (e.g. "Photo:") */
        form label{
            display:none;
        }

        /* Style the file input nicely */
        form input[type="file"]{
            display:block;
            width:100%;
            padding:12px 14px;
            border:1.5px dashed var(--line);
            border-radius:10px;
            background:#fcfbfd;
            color: var(--muted);
        }

        form input[type="file"]:focus{
            outline:none;
            border-color: var(--accent);
            box-shadow:0 0 0 3px rgba(201,139,160,.15);
        }

        /* Upload Button */
        .btn-primary{
            background: var(--accent);
            border:none;
            font-weight:600;
            padding: 10px 0;
            border-radius: 10px;
            letter-spacing:.3px;
        }

        .btn-primary:hover{
            background: var(--accent-dark);
        }

        /* Gallery Heading */
        h3{
            color: var(--ink);
            font-weight:600;
            position: relative;
        }

        /* Gallery Cards */
        .gallery-card{
            background: var(--surface);
            box-shadow: 0 4px 20px rgba(59,53,80,.05);
            border: 1px solid var(--line);
        }

        .gallery-card:hover{
            transform:translateY(-5px);
            box-shadow:0 12px 30px rgba(59,53,80,.12);
        }

        .card img{
            height:250px;
            object-fit:cover;
        }

        .card-body h6{
            color: var(--ink);
            font-weight:600;
            font-size: .95rem;
            letter-spacing:.2px;
        }

        .card-footer{
            background: var(--surface);
            border-top: 1px solid var(--line) !important;
        }

        .card-footer small{
            color: var(--muted) !important;
        }

        .alert-warning{
            background: #fbeef2;
            color: var(--accent-dark);
            border: none;
            border-radius: 10px;
        }

        footer{
            margin-top:60px;
            background: var(--surface) !important;
            color: var(--muted) !important;
            border-top: 1px solid var(--line);
            padding: 20px 0;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">📷 Image Gallery</a>
    </div>
</nav>

<!-- Upload Section -->
<div class="container mt-5">

    <div class="card shadow-lg mb-5 upload-card">
        <div class="card-body p-4">

            <h2 class="text-center mb-4 text-primary">
                Upload Image
            </h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                {{ form }}

                <div class="mt-3">
                    <input type="submit"
                           value="Upload"
                           class="btn btn-primary w-100">
                </div>

            </form>

        </div>
    </div>

    <h3 class="text-center mb-4">
        Uploaded Images
    </h3>

    <div class="row">

        {% for x in img %}

        <div class="col-lg-4 col-md-6 mb-4">

            <div class="card shadow gallery-card">

                <img src="{{ x.photo.url }}"
                     class="card-img-top"
                     alt="Image">

                <div class="card-body text-center">

                    <h6>
                        Uploaded Image
                    </h6>

                </div>

                <div class="card-footer text-center">

                    <small>
                        {{ x.date }}
                    </small>

                </div>

            </div>

        </div>

        {% empty %}

        <div class="col-12">
            <div class="alert alert-warning text-center">
                No Images Uploaded Yet.
            </div>
        </div>

        {% endfor %}

    </div>

</div>

<!-- Footer -->
<footer class="text-center">
    <p class="mb-0">
        © 2026 Image Gallery | Made with Django & Bootstrap
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
